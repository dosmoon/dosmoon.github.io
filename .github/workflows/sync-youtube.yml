name: Sync YouTube videos

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch RSS and write videos.json
        run: python scripts/sync_youtube.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain videos.json)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add videos.json
            git commit -m "chore: sync VideoCraftNews videos"
            git push
          else
            echo "No changes."
          fi
